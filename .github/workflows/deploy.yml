name: Deploy Afferent Signal to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build static export
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://wznicchxpogzdiqeyckg.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_iDUHjsXn1hok3uGcfRU7dg_T7P7XEyG
          NEXT_PUBLIC_DASHBOARD_KEYS: ${{ secrets.NEXT_PUBLIC_DASHBOARD_KEYS }}
          NEXT_PUBLIC_BASE_PATH: /afferent-signal
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Add .nojekyll
        run: touch ./frontend/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
